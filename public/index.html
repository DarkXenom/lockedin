<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#08080c">
  <title>locked in — the shred pact</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="crt"></div>
  <div id="toasts"></div>
  <canvas id="confetti"></canvas>

  <!-- ============ LOGIN ============ -->
  <div id="login-screen" class="hidden">
    <div class="login-box">
      <div class="logo glitch" data-text="LOCKED IN">LOCKED IN</div>
      <div class="login-sub">the shred pact</div>
      <div class="login-count"><span id="login-days">—</span> days until 12.20.26</div>
      <div class="login-tag">ripped by dec 20 or we're cooked. this is in writing.</div>

      <div class="login-tabs">
        <button id="tab-login" class="login-tab active" type="button">log in</button>
        <button id="tab-register" class="login-tab" type="button">join the pact</button>
      </div>

      <form id="login-form" autocomplete="off">
        <input id="login-name" type="text" placeholder="name" maxlength="16" autocomplete="username">
        <input id="login-pin" type="password" inputmode="numeric" placeholder="pin (4-8 digits)" maxlength="8" autocomplete="current-password">
        <input id="login-invite" type="text" placeholder="invite code" class="hidden">
        <div id="login-error" class="login-error"></div>
        <button id="login-submit" class="btn-volt" type="submit">lock in</button>
      </form>
    </div>
  </div>

  <!-- ============ APP SHELL ============ -->
  <div id="app" class="hidden">
    <header id="topbar">
      <div class="topbar-left">
        <span class="logo-mini">LOCKED IN</span>
        <span id="winter-chip" class="winter-chip hidden">winter arc</span>
      </div>
      <div class="topbar-right">
        <span class="chip chip-days"><b id="chip-days">—</b><i>days left</i></span>
        <span class="chip chip-streak"><svg viewBox="0 0 8 10" class="px-flame"><g id="flame-g"></g></svg><b id="chip-streak">0</b></span>
        <span class="chip chip-aura"><b id="chip-aura">0</b><i>aura</i></span>
        <span class="chip chip-coins"><b id="chip-coins">0</b><i>coins</i></span>
        <button id="btn-profile" class="avatar-btn" type="button" title="profile"></button>
      </div>
    </header>

    <main id="view"></main>

    <nav id="tabbar">
      <button class="tab" data-tab="home" type="button"><span class="tab-ico">⌂</span>home</button>
      <button class="tab" data-tab="chat" type="button"><span class="tab-ico">▣</span>chat<span id="chat-badge" class="badge hidden"></span></button>
      <button class="tab" data-tab="board" type="button"><span class="tab-ico">▲</span>board</button>
      <button class="tab" data-tab="stats" type="button"><span class="tab-ico">σ</span>stats</button>
      <button class="tab" data-tab="shop" type="button"><span class="tab-ico">$</span>shop</button>
    </nav>
  </div>

  <!-- ============ PROFILE MODAL ============ -->
  <div id="modal-root" class="hidden"></div>

  <script src="/socket.io/socket.io.js"></script>
  <script type="module" src="js/app.js"></script>
</body>
</html>
