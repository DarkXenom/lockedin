# keeps the free render instance awake so the ref's schedulers
# (auto-skips, 8pm reminders, weekly fame, monthly wrapped) fire on time.
name: keepalive
on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:
jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: ping the ref
        run: curl -fsS --max-time 30 https://lockedin-jyp5.onrender.com/api/config > /dev/null && echo "the ref is awake"
